version: '3.4'

services:
  bikerentalsystem.api:
    image: ${DOCKER_REGISTRY-}bikerentalsystemapi
    build:
      context: .
      dockerfile: src/BikeRentalSystem.Api/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:13
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bike_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"
      - "5672:5672"

volumes:
  postgres-data:
